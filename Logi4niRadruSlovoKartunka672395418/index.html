<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logic Game</title>
    <style>
        /* Оранжевий фон з візерунком "спіральки" */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #FFB74D; /* Основний оранжевий колір */
            /* Використовуємо SVG-дані для створення чистого візерунка спіралі */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30 C 35 30, 35 35, 30 35 C 25 35, 25 25, 30 25 C 40 25, 40 40, 30 40 C 15 40, 15 20, 30 20 C 50 20, 50 50, 30 50 C 5 50, 5 10, 30 10 C 60 10, 60 60, 30 60' stroke='%23E65100' stroke-width='2' fill='none' opacity='0.2'/%3E%3C/svg%3E");
            background-size: 80px 80px;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            overscroll-behavior: none; /* Запобігає pull-to-refresh на мобільних */
        }

        #game-container {
            width: 90%;
            max-width: 1600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 80px;
            border: 15px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Оптимізація для широких екранів */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            width: 100%;
        }

        /* Об'ємні 3D картки */
        .card {
            min-height: 350px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 65px;
            font-weight: 900;
            color: #fff;
            text-shadow: 4px 4px 10px rgba(0,0,0,0.3);
            text-align: center;
            padding: 20px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 10px solid rgba(255,255,255,0.6);
            box-shadow: 0 20px 0 rgba(0,0,0,0.2), 0 25px 40px rgba(0,0,0,0.4);
            
            /* Мобільні оптимізації для комфортної гри */
            touch-action: manipulation; /* Блокує double-tap зум */
            user-select: none;
            -webkit-user-select: none;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .card.emoji { font-size: 160px; }

        /* Кольори для карток */
        .c-0 { background: linear-gradient(135deg, #ff9ff3, #f368e0); }
        .c-1 { background: linear-gradient(135deg, #ff9f43, #ee5253); }
        .c-2 { background: linear-gradient(135deg, #00d2d3, #01a3a4); }
        .c-3 { background: linear-gradient(135deg, #48dbfb, #2e86de); }

        .card:hover { transform: translateY(-15px); filter: brightness(1.1); }

        /* Візуальний фідбек (без слів) */
        .correct {
            animation: win 0.6s infinite alternate;
            background: linear-gradient(135deg, #2ecc71, #27ae60) !important;
            border-color: #fff !important;
            pointer-events: none;
        }

        .wrong {
            animation: shake 0.4s;
            background: linear-gradient(135deg, #ff4d4d, #b33939) !important;
        }

        @keyframes win {
            from { transform: scale(1); box-shadow: 0 0 20px #fff; }
            to { transform: scale(1.1); box-shadow: 0 0 80px #fff; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-20px); }
            75% { transform: translateX(20px); }
        }

        /* Кнопка-стрілка (без тексту) */
        #next-btn {
            margin-top: 50px;
            width: 140px;
            height: 140px;
            background: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            font-size: 80px;
            box-shadow: 0 15px 0 #ccc, 0 20px 40px rgba(0,0,0,0.3);
            transition: 0.1s;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        #next-btn:active { transform: translateY(10px); box-shadow: 0 5px 0 #ccc; }

        /* =========================================
           МЕДІА-ЗАПИТИ ДЛЯ МАСШТАБУВАННЯ НА ТЕЛЕФОНАХ
           ========================================= */

        /* Планшети та малі екрани (перехідний стан) */
        @media (max-width: 1000px) {
            .grid { grid-template-columns: 1fr 1fr; gap: 20px; }
            .card { min-height: 200px; font-size: 40px; border-radius: 30px; border-width: 8px; padding: 15px; }
            .card.emoji { font-size: 100px; }
            #game-container { padding: 30px; border-radius: 50px; border-width: 10px; }
            #next-btn { width: 100px; height: 100px; font-size: 50px; margin-top: 30px; }
        }

        /* Телефони у вертикальній (портретній) орієнтації */
        @media (max-width: 600px) {
            .grid { gap: 15px; }
            .card { min-height: 130px; font-size: 18px; border-radius: 20px; border-width: 5px; box-shadow: 0 10px 0 rgba(0,0,0,0.2), 0 15px 20px rgba(0,0,0,0.4); }
            .card.emoji { font-size: 65px; }
            #game-container { padding: 20px; border-radius: 30px; border-width: 6px; width: 85%; }
            #next-btn { width: 70px; height: 70px; font-size: 35px; margin-top: 20px; box-shadow: 0 8px 0 #ccc, 0 10px 20px rgba(0,0,0,0.3); }
            #next-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #ccc; }
        }

        /* Телефони у горизонтальній (ландшафтній) орієнтації */
        @media (max-height: 600px) and (orientation: landscape) {
            #game-container { 
                padding: 15px; 
                border-radius: 20px; 
                border-width: 5px; 
                flex-direction: row; /* Розміщуємо кнопку поруч із сіткою */
                justify-content: center;
                gap: 20px;
                width: 95%;
            }
            .grid { 
                grid-template-columns: repeat(4, 1fr); /* Повертаємо 4 в ряд для ландшафту */
                gap: 15px; 
                flex: 1;
            }
            .card { 
                min-height: 100px; 
                font-size: 18px; 
                border-radius: 15px; 
                border-width: 4px; 
                padding: 5px;
                box-shadow: 0 8px 0 rgba(0,0,0,0.2), 0 10px 15px rgba(0,0,0,0.4);
            }
            .card.emoji { font-size: 50px; }
            #next-btn { 
                margin-top: 0; 
                width: 70px; 
                height: 70px; 
                font-size: 35px; 
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="grid" id="grid"></div>
    <button id="next-btn" onclick="nextLevel()">➔</button>
</div>

<script>
    const levels = [
        { i: [{t:'Яблуко', v:'🍎'}, {t:'Банан', v:'🍌'}, {t:'Груша', v:'🍐'}], o: {t:'Морква', v:'🥕'} },
        { i: [{t:'Авто', v:'🚗'}, {t:'Автобус', v:'🚌'}, {t:'Поїзд', v:'🚂'}], o: {t:'Човен', v:'🚤'} },
        { i: [{t:'Ліжко', v:'🛏️'}, {t:'Стіл', v:'🪑'}, {t:'Шафа', v:'🚪'}], o: {t:'Каструля', v:'🍲'} },
        { i: [{t:'Собака', v:'🐕'}, {t:'Кіт', v:'🐈'}, {t:'Корова', v:'🐄'}], o: {t:'Лев', v:'🦁'} },
        { i: [{t:'Олівець', v:'✏️'}, {t:'Ручка', v:'🖋️'}, {t:'Зошит', v:'📓'}], o: {t:'М\'яч', v:'⚽'} },
        { i: [{t:'Кепка', v:'🧢'}, {t:'Пальто', v:'🧥'}, {t:'Шкарпетки', v:'🧦'}], o: {t:'Морозиво', v:'🍦'} },
        { i: [{t:'Сонце', v:'☀️'}, {t:'Місяць', v:'🌙'}, {t:'Зірка', v:'⭐'}], o: {t:'Квітка', v:'🌸'} },
        { i: [{t:'Піаніно', v:'🎹'}, {t:'Гітара', v:'🎸'}, {t:'Скрипка', v:'🎻'}], o: {t:'Молоток', v:'🔨'} },
        { i: [{t:'Муха', v:'🪰'}, {t:'Комар', v:'🦟'}, {t:'Бджола', v:'🐝'}], o: {t:'Слон', v:'🐘'} },
        { i: [{t:'Літак', v:'✈️'}, {t:'Ракета', v:'🚀'}, {t:'Гелікоптер', v:'🚁'}], o: {t:'Велосипед', v:'🚲'} },
        { i: [{t:'Огірок', v:'🥒'}, {t:'Помідор', v:'🍅'}, {t:'Перець', v:'🫑'}], o: {t:'Кавун', v:'🍉'} },
        { i: [{t:'Тарілка', v:'🍽️'}, {t:'Виделка', v:'🍴'}, {t:'Ніж', v:'🔪'}], o: {t:'Черевик', v:'👞'} },
        { i: [{t:'Коло', v:'⭕'}, {t:'Квадрат', v:'⬛'}, {t:'Ромб', v:'🔶'}], o: {t:'Хмара', v:'☁️'} },
        { i: [{t:'Кінь', v:'🐎'}, {t:'Вівця', v:'🐑'}, {t:'Свиня', v:'🐖'}], o: {t:'Акула', v:'🦈'} },
        { i: [{t:'Лікар', v:'🧑‍⚕️'}, {t:'Вчитель', v:'🧑‍🏫'}, {t:'Пожежник', v:'🧑‍🚒'}], o: {t:'Робот', v:'🤖'} }
    ];

    let currentLevelIdx = 0;

    function initLevel() {
        const grid = document.getElementById('grid');
        const nextBtn = document.getElementById('next-btn');
        const levelData = levels[currentLevelIdx];
        
        grid.innerHTML = '';
        nextBtn.style.display = 'none';

        // Формуємо набір з 4 елементів (3 звичайних + 1 зайвий)
        let items = [...levelData.i, levelData.o];
        
        // Перемішуємо їх рандомно, щоб зайвий був у несподіваному місці
        items = items.sort(() => Math.random() - 0.5);

        // Визначаємо 2 випадкових індекси для ТЕКСТУ, інші 2 будуть ЕМОДЗІ
        let textIndices = [0, 1, 2, 3].sort(() => Math.random() - 0.5).slice(0, 2);

        items.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = `card c-${index}`;
            
            const isOdd = (item === levelData.o);

            if (textIndices.includes(index)) {
                card.innerText = item.t.toUpperCase();
            } else {
                card.classList.add('emoji');
                card.innerText = item.v;
            }

            card.onclick = () => {
                if (isOdd) {
                    card.classList.add('correct');
                    nextBtn.style.display = 'block';
                    document.querySelectorAll('.card').forEach(c => c.style.pointerEvents = 'none');
                } else {
                    card.classList.add('wrong');
                    setTimeout(() => card.classList.remove('wrong'), 400);
                }
            };
            grid.appendChild(card);
        });
    }

    function nextLevel() {
        currentLevelIdx++;
        if (currentLevelIdx < levels.length) {
            initLevel();
        } else {
            // Фінальний екран також без слів, лише емодзі
            document.getElementById('game-container').innerHTML = "<div style='font-size:150px'>🏆</div><button id='next-btn' style='display:block' onclick='location.reload()'>🔄</button>";
        }
    }

    initLevel();
</script>

</body>
</html>
